name: Build and publish opencode-router image

# Builds and pushes the opencode-router Docker image to GHCR on every push to main.
#
# Image: ghcr.io/<owner>/opencode-router:<version>-main.<sha7>  and  :latest
#
# After a successful build the image tag can be deployed to the homelab by:
#   Option A (automatic): Configure HOMELAB_APPS_PAT secret (fine-grained PAT with
#     "Actions: write" permission on mrsimpson/homelab-apps). The "trigger-deploy" job
#     then dispatches the deploy-opencode-router workflow in homelab-apps automatically.
#   Option B (manual): Run:
#     gh workflow run deploy-opencode-router.yml \
#       --repo mrsimpson/homelab-apps \
#       --field routerImage=ghcr.io/mrsimpson/opencode-router:<tag>
#   Option C (Renovate): Renovate tracks GHCR image tags and opens PRs against
#     homelab-apps when new tags appear.

on:
  push:
    branches:
      - main
    paths:
      - packages/**
      - Dockerfile
      - .github/workflows/build-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/opencode-router

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      image: ${{ steps.version.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./packages/router/package.json').version")
          SHA_SHORT=${GITHUB_SHA::7}
          TAG="${VERSION}-${GITHUB_REF_NAME}.${SHA_SHORT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE_NAME}:${TAG}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tag
        run: echo "Built and pushed ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}"

  trigger-deploy:
    # Dispatches the deploy-opencode-router workflow in homelab-apps with the new image tag.
    # Requires HOMELAB_APPS_PAT secret: a fine-grained PAT with "Actions: write" on
    # mrsimpson/homelab-apps. If the secret is absent the step exits 0 gracefully.
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger homelab-apps deploy
        env:
          GH_TOKEN: ${{ secrets.HOMELAB_APPS_PAT }}
          IMAGE: ${{ needs.build.outputs.image }}
          OWNER: ${{ github.repository_owner }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "HOMELAB_APPS_PAT secret not configured — skipping auto-deploy."
            echo "To deploy manually: gh workflow run deploy-opencode-router.yml --repo ${OWNER}/homelab-apps --field routerImage=${IMAGE}"
            exit 0
          fi
          gh workflow run deploy-opencode-router.yml \
            --repo "${OWNER}/homelab-apps" \
            --field "routerImage=${IMAGE}"
          echo "Triggered deploy-opencode-router.yml in ${OWNER}/homelab-apps with image: ${IMAGE}"
