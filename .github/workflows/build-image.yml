name: Build and publish opencode-router image

# Builds and pushes the opencode-router Docker image to GHCR on every push to main.
#
# Image: ghcr.io/<owner>/opencode-router:<version>-main.<sha7>  and  :latest
#
# After a successful build the image tag can be deployed to the homelab by:
  #   Option A (automatic): Configure HOMELAB_APPS_PAT secret (fine-grained PAT with
  #     "Actions: write" permission on digitaleraluhut/homelab-apps). The "trigger-deploy" job
  #     then dispatches the deploy-opencode-router workflow in homelab-apps automatically.
  #   Option B (manual): Run:
  #     gh workflow run deploy-opencode-router.yml \
  #       --repo digitaleraluhut/homelab-apps \
  #       --field routerImage=ghcr.io/mrsimpson/opencode-router:<tag>
  #   Option C (Renovate): Renovate tracks GHCR image tags and opens PRs against
  #     homelab-apps when new tags appear.
#
# Note: uses plain `docker build` + `docker push` (not buildx) to avoid
# GHCR cross-owner blob mount 403 errors that occur with buildx on new packages.

on:
  push:
    branches:
      - main
    paths:
      - packages/**
      - Dockerfile
      - .github/workflows/build-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/opencode-router
  EDITOR_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/opencode-editor
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      image: ${{ steps.version.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GH_PAT }}" | docker login ghcr.io \
            -u ${{ github.repository_owner }} --password-stdin

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./packages/router/package.json').version")
          SHA_SHORT=${GITHUB_SHA::7}
          # Sanitize branch name for Docker tag (replace / with -)
          SAFE_REF=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
          TAG="${VERSION}-${SAFE_REF}.${SHA_SHORT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE_NAME}:${TAG}" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          docker build \
            --build-arg APP_VERSION="${{ steps.version.outputs.tag }}" \
            --label "org.opencontainers.image.source=${{ env.GITHUB_SERVER_URL }}/${{ env.GITHUB_REPOSITORY }}/blob/${{ env.GITHUB_REF_NAME }}/Dockerfile" \
            -t ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
          docker push ${{ env.IMAGE_NAME }}:latest
          echo "Built and pushed ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}"

  build-editor:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      image: ${{ steps.version.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GH_PAT }}" | docker login ghcr.io \
            -u ${{ github.repository_owner }} --password-stdin

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./packages/editor/package.json').version")
          SHA_SHORT=${GITHUB_SHA::7}
          # Sanitize branch name for Docker tag (replace / with -)
          SAFE_REF=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
          TAG="${VERSION}-${SAFE_REF}.${SHA_SHORT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "image=${EDITOR_IMAGE_NAME}:${TAG}" >> $GITHUB_OUTPUT

      - name: Build editor
        working-directory: packages/editor
        run: |
          docker build \
            -t ${{ env.EDITOR_IMAGE_NAME }}:${{ steps.version.outputs.tag }} \
            -t ${{ env.EDITOR_IMAGE_NAME }}:latest \
            .

      - name: Push editor
        run: |
          docker push ${{ env.EDITOR_IMAGE_NAME }}:${{ steps.version.outputs.tag }}
          docker push ${{ env.EDITOR_IMAGE_NAME }}:latest
          echo "Built and pushed ${{ env.EDITOR_IMAGE_NAME }}:${{ steps.version.outputs.tag }}"

  trigger-deploy:
    # Dispatches the deploy-opencode-router workflow in homelab-apps with the new image tag.
    # Requires HOMELAB_APPS_PAT secret: a fine-grained PAT with "Actions: write" on
    # digitaleraluhut/homelab-apps. If the secret is absent the step exits 0 gracefully.
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger homelab-apps deploy
        env:
          GH_TOKEN: ${{ secrets.HOMELAB_APPS_PAT }}
          IMAGE: ${{ needs.build.outputs.image }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "HOMELAB_APPS_PAT secret not configured — skipping auto-deploy."
            echo "To deploy manually: gh workflow run deploy-opencode-router.yml --repo digitaleraluhut/homelab-apps --field routerImage=${IMAGE}"
            exit 0
          fi
          gh workflow run deploy-opencode-router.yml \
            --repo "digitaleraluhut/homelab-apps" \
            --field "routerImage=${IMAGE}"
          echo "Triggered deploy-opencode-router.yml in digitaleraluhut/homelab-apps with image: ${IMAGE}"
