name: Build and publish opencode-router image

on:
  push:
    branches:
      - main
    paths:
      - packages/**
      - Dockerfile
      - .github/workflows/build-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/opencode-router

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./packages/router/package.json').version")
          SHA_SHORT=${GITHUB_SHA::7}
          TAG="${VERSION}-${GITHUB_REF_NAME}.${SHA_SHORT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE_NAME}:${TAG}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tag
        run: echo "Built and pushed ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}"

  update-homelab:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout homelab-apps
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homelab-apps
          token: ${{ secrets.HOMELAB_APPS_PAT || secrets.GITHUB_TOKEN }}
          path: homelab-apps

      - name: Update Pulumi stack config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cd homelab-apps
          IMAGE_TAG="${{ needs.build.outputs.tag }}"
          yq e '.config["code:routerImage"] = "${{ env.IMAGE_NAME }}:'"${IMAGE_TAG}"'"' \
            -i apps/opencode-router/Pulumi.dev.yaml
          git add apps/opencode-router/Pulumi.dev.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore(deploy): update opencode-router image to ${IMAGE_TAG}"
          git push
